services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: zaza_db
      POSTGRES_USER: zaza_user
      POSTGRES_PASSWORD: zaza_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.dev
    depends_on:
      - db
      - redis

volumes:
  postgres_data: